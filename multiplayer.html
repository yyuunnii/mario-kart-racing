<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>马里奥卡丁车 - 多人联机版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #gameWrapper {
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        #gameTitle { color: #ffd700; font-size: 1.5rem; font-weight: bold; text-shadow: 2px 2px 0 #e74c3c, 4px 4px 0 #3498db; margin-bottom: 5px; letter-spacing: 2px; }
        @media (max-width: 768px) { #gameTitle { display: none; } }
        
        #gameContainer { 
            position: relative; 
            border-radius: 10px; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 40px rgba(255,215,0,0.2); 
            overflow: hidden; 
        }
        @media (max-width: 768px) { 
            #gameContainer { border-radius: 0; width: 100%; height: 100%; max-width: 100%; max-height: 100%; }
        }
        
        #gameCanvas { display: block; background: #2d5016; }
        @media (max-width: 768px) { #gameCanvas { width: 100%; height: 100%; } }
        
        /* UI 面板 */
        .ui-panel { 
            position: absolute; 
            background: rgba(0,0,0,0.7); 
            border-radius: 8px; 
            padding: 8px 12px; 
            color: white; 
            font-weight: bold; 
            font-size: 0.9rem;
        }
        
        #speedometer { bottom: 15px; right: 15px; text-align: center; }
        #speedValue { font-size: 1.5rem; color: #ffd700; }
        #lapInfo { top: 15px; left: 15px; }
        #ranking { top: 15px; right: 15px; text-align: right; }
        #itemBox { 
            bottom: 15px; left: 50%; transform: translateX(-50%); 
            width: 60px; height: 60px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 2rem; border: 3px solid #ffd700; 
        }
        
        /* 屏幕 */
        #startScreen, #lobbyScreen, #gameOverScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            pointer-events: auto; z-index: 100; 
        }
        
        .screen-title { 
            font-size: 2.5rem; color: #ffd700; 
            text-shadow: 3px 3px 0 #e74c3c, 6px 6px 0 #3498db; 
            margin-bottom: 30px; animation: titlePulse 2s ease-in-out infinite;
        }
        @keyframes titlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .btn { 
            padding: 15px 40px; margin: 10px; 
            font-size: 1.2rem; font-weight: bold; 
            border: none; border-radius: 50px; cursor: pointer; 
            transition: all 0.3s; text-transform: uppercase; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .btn-primary { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }
        .btn-secondary { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        .btn-success { background: linear-gradient(135deg, #27ae60, #229954); color: white; }
        
        /* 房间列表 */
        #roomList { 
            width: 80%; max-width: 500px; max-height: 300px; 
            background: rgba(255,255,255,0.1); border-radius: 10px; 
            padding: 15px; margin: 20px 0; overflow-y: auto;
        }
        .room-item { 
            background: rgba(255,255,255,0.1); padding: 15px; 
            margin: 10px 0; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s;
        }
        .room-item:hover { background: rgba(255,255,255,0.2); transform: translateX(5px); }
        .room-name { font-weight: bold; color: #ffd700; }
        .room-info { color: #aaa; font-size: 0.9rem; }
        
        /* 房间信息 */
        #roomInfo { 
            background: rgba(255,255,255,0.1); padding: 20px; 
            border-radius: 10px; margin: 20px 0; text-align: center;
        }
        #roomCode { 
            font-size: 2rem; color: #ffd700; letter-spacing: 5px; 
            background: rgba(0,0,0,0.3); padding: 10px 20px; 
            border-radius: 8px; margin: 10px 0;
        }
        
        /* 玩家列表 */
        #playerList { 
            display: flex; gap: 15px; margin: 20px 0;
        }
        .player-card { 
            background: rgba(255,255,255,0.1); padding: 15px; 
            border-radius: 10px; text-align: center; min-width: 100px;
        }
        .player-avatar { font-size: 2rem; margin-bottom: 5px; }
        .player-name { color: white; font-weight: bold; }
        .player-status { color: #27ae60; font-size: 0.8rem; }
        .is-host { border: 2px solid #ffd700; }
        .is-me { background: rgba(52, 152, 219, 0.3); }
        
        /* 车辆选择 */
        #carSelect { 
            display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; justify-content: center;
        }
        .car-option { 
            background: rgba(255,255,255,0.1); padding: 15px; 
            border-radius: 10px; text-align: center; cursor: pointer;
            transition: all 0.3s; min-width: 80px;
        }
        .car-option:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .car-option.selected { border: 3px solid #ffd700; background: rgba(255,215,0,0.2); }
        .car-emoji { font-size: 2rem; }
        .car-name { font-size: 0.8rem; color: white; margin-top: 5px; }
        
        /* 输入框 */
        .input-group { margin: 15px 0; }
        .input-group label { color: #aaa; font-size: 0.9rem; display: block; margin-bottom: 5px; }
        .input-group input { 
            padding: 12px 20px; font-size: 1rem; border: none; 
            border-radius: 25px; background: rgba(255,255,255,0.1); 
            color: white; width: 250px; text-align: center;
        }
        .input-group input:focus { outline: none; background: rgba(255,255,255,0.2); }
        
        /* 连接状态 */
        #connectionStatus { 
            position: fixed; top: 10px; right: 10px; 
            padding: 8px 15px; border-radius: 20px; font-size: 0.8rem;
        }
        .connected { background: #27ae60; color: white; }
        .connecting { background: #f39c12; color: white; }
        .disconnected { background: #e74c3c; color: white; }
        
        /* 移动端触摸控制 */
        #mobileControls { display: none; }
        @media (max-width: 768px) {
            #mobileControls { 
                display: flex; position: fixed; bottom: 0; left: 0; 
                width: 100%; height: 120px; z-index: 50;
            }
            #joystickArea { 
                position: absolute; left: 20px; bottom: 20px; 
                width: 100px; height: 100px; 
                background: rgba(255,255,255,0.2); border-radius: 50%;
            }
            #joystick { 
                position: absolute; left: 35px; top: 35px; 
                width: 30px; height: 30px; 
                background: rgba(255,255,255,0.5); border-radius: 50%;
            }
            #actionButtons { 
                position: absolute; right: 20px;
