<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>马里奥卡丁车 - Mario Kart Racing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameTitle {
            color: #ffd700;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 3px 3px 0 #e74c3c, 6px 6px 0 #3498db;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        @media (max-width: 768px) {
            #gameTitle {
                font-size: 1.2rem;
                margin-bottom: 5px;
            }
        }
        
        #gameContainer {
            position: relative;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 60px rgba(255, 215, 0, 0.2);
            overflow: hidden;
            max-width: 100vw;
            max-height: 70vh;
        }
        
        @media (max-width: 768px) {
            #gameContainer {
                border-radius: 10px;
            }
        }
        
        #gameCanvas {
            display: block;
            background: #2d5016;
            max-width: 100%;
            max-height: 70vh;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .ui-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            padding: 10px 15px;
            color: white;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .ui-panel {
                padding: 5px 10px;
                border-radius: 8px;
                font-size: 0.8rem;
            }
        }
        
        #speedometer {
            bottom: 20px;
            right: 20px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            #speedometer {
                bottom: 10px;
                right: 10px;
            }
        }
        
        #speedValue {
            font-size: 2rem;
            color: #ffd700;
        }
        
        @media (max-width: 768px) {
            #speedValue {
                font-size: 1.2rem;
            }
        }
        
        #lapInfo {
            top: 20px;
            left: 20px;
        }
        
        @media (max-width: 768px) {
            #lapInfo {
                top: 10px;
                left: 10px;
            }
        }
        
        #ranking {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        
        @media (max-width: 768px) {
            #ranking {
                top: 10px;
                right: 10px;
            }
        }
        
        #itemBox {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid #ffd700;
        }
        
        @media (max-width: 768px) {
            #itemBox {
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
                bottom: 10px;
            }
        }
        
        #controls {
            margin-top: 15px;
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            #controls {
                display: none;
            }
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        .screen-title {
            font-size: 3rem;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #e74c3c;
        }
        
        @media (max-width: 768px) {
            .screen-title {
                font-size: 1.8rem;
                margin-bottom: 15px;
            }
        }
        
        .btn {
            background: linear-gradient(145deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            margin: 10px;
        }
        
        @media (max-width: 768px) {
            .btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
        
        .btn:hover, .btn:active {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.6);
        }
        
        .hidden {
            display: none !important;
        }
        
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            color: #ffd700;
            font-weight: bold;
            text-shadow: 4px 4px 0 #e74c3c;
            z-index: 50;
        }
        
        @media (max-width: 768px) {
            #countdown {
                font-size: 4rem;
            }
        }
        
        /* 移动端触摸控制 */
        #touchControls {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            z-index: 200;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            #touchControls {
                display: flex;
            }
        }
        
        .touch-area {
            position: absolute;
            pointer-events: auto;
        }
        
        #dPad {
            left: 20px;
            bottom: 20px;
            width: 120px;
            height: 120px;
        }
        
        .d-btn {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            touch-action: manipulation;
        }
        
        .d-btn:active {
            background: rgba(255, 215, 0, 0.5);
            border-color: #ffd700;
        }
        
        #dUp { top: 0; left: 40px; }
        #dDown { bottom: 0; left: 40px; }
        #dLeft { left: 0; top: 40px; }
        #dRight
